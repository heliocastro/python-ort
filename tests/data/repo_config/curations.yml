analyzer:
  skip_excluded: true
  enabled_package_managers: ['Conan']
  package_managers:
    Conan:
      options:
        lockfileName: conan.lock

excludes:
  paths:
    - pattern: "buildfiles/**"
      reason: "BUILD_TOOL_OF"
      comment: "Contains buildscripts and other stuff not included in final delivery"
    - pattern: "doc/**"
      reason: "DOCUMENTATION_OF"
      comment: "Contains documentation"
    - pattern: "doc/**"
      reason: "DOCUMENTATION_OF"
      comment: "Contains documentation"
    - pattern: "scripts/**"
      reason: "OTHER"
      comment: "Various scripts used for bug analysis, code formatting etc."
    - pattern: "test/**"
      reason: "TEST_OF"
      comment: "Test data"
    - pattern: "tools/**"
      reason: "TEST_TOOL_OF"
      comment: "Test framework and other stuff not included in final delivery"
    - pattern: "dev/EhrTests/**"
      reason: "TEST_TOOL_OF"
      comment: "EhrTest app not included in final delivery"
  scopes:
    - pattern: "androidJacocoAnt"
      reason: "TEST_DEPENDENCY_OF"
      comment: "Jacoco is used for code coverage. Not part of the release."
    - pattern: "debugAndroidTestCompileClasspath"
      reason: "TEST_DEPENDENCY_OF"
      comment: "Compile dependencies for instrumentation tests. Not part of the release."

snippet_choices:
- provenance:
    url: "https://github.com/Kitware/iMSTK.git"
  choices:
    - given:
        source_location:
          path: "dev/CppCodecWrapper/inc/CppCodecWrapper/base64_rfc4648.h"
          start_line: 21
          end_line: 34
      choice:
        purl: "pkg:github/kitware/imstk"
        reason: "NO_RELEVANT_FINDING"
        comment: "The only similarity here is defining macros to suppress a warning. This was necessary to handle GNU, Clang and MSVC compiler. This is common practice and no licence was violated."

